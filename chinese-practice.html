<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Practice — NYC Tech</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fafaf8;--surface:#fff;--border:rgba(0,0,0,.09);--border-mid:rgba(0,0,0,.16);
  --text:#1a1a18;--text-muted:#6b6b66;--text-faint:#a8a8a2;
  --purple-bg:#EEEDFE;--purple-text:#3C3489;--purple-border:#AFA9EC;--purple-mid:#7F77DD;
  --teal-bg:#E1F5EE;--teal-text:#085041;--teal-border:#5DCAA5;
  --amber-bg:#FAEEDA;--amber-text:#633806;--amber-border:#EF9F27;
  --blue-bg:#E6F1FB;--blue-text:#0C447C;--blue-border:#85B7EB;
  --coral-bg:#FAECE7;--coral-text:#712B13;--coral-border:#F0997B;
  --red-bg:#FCEBEB;--red-text:#791F1F;--red-border:#F09595;
  --radius:10px;--radius-sm:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;}
.site-header{padding:1.25rem 1.5rem 0;max-width:920px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.site-title{font-size:15px;font-weight:600;color:var(--text);}
.site-desc{font-size:13px;color:var(--text-faint);}
.level-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.level-tab{padding:6px 14px;border-radius:99px;border:0.5px solid var(--border-mid);background:var(--surface);color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .12s;}
.level-tab:hover{background:var(--bg);}
.level-tab.lv0.active{background:var(--teal-bg);color:var(--teal-text);border-color:var(--teal-border);}
.level-tab.lv1.active{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue-border);}
.level-tab.lv2.active{background:var(--amber-bg);color:var(--amber-text);border-color:var(--amber-border);}
.level-tab.lv3.active{background:var(--coral-bg);color:var(--coral-text);border-color:var(--coral-border);}
.level-desc{font-size:12px;color:var(--text-faint);padding:.4rem 1.5rem .8rem;max-width:920px;margin:0 auto;}
.layout{max-width:920px;margin:0 auto;padding:1rem 1.5rem 3rem;display:grid;grid-template-columns:195px 1fr;gap:1.25rem;align-items:start;}
.sidebar{position:sticky;top:1rem;}
.sidebar-label{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;padding-left:2px;}
.topic-list{display:flex;flex-direction:column;gap:2px;}
.topic-btn{display:flex;align-items:center;gap:7px;width:100%;padding:7px 10px;border:none;border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);font-size:12px;cursor:pointer;text-align:left;transition:background .1s,color .1s;}
.topic-btn:hover{background:var(--border);color:var(--text);}
.topic-btn.active{background:var(--purple-bg);color:var(--purple-text);font-weight:500;}
.topic-num{font-size:10px;color:var(--text-faint);min-width:18px;}
.topic-btn.active .topic-num{color:var(--purple-mid);}
.topic-new{font-size:9px;font-weight:600;background:var(--amber-bg);color:var(--amber-text);border:0.5px solid var(--amber-border);border-radius:4px;padding:1px 5px;margin-left:2px;}
.slang-tag{font-size:10px;font-weight:600;background:var(--coral-bg);color:var(--coral-text);border:0.5px solid var(--coral-border);border-radius:4px;padding:1px 6px;margin-left:6px;vertical-align:middle;}
.main{min-width:0;}
.topic-header{margin-bottom:1rem;}
.topic-zh{font-size:20px;font-weight:600;color:var(--text);}
.topic-en{font-size:13px;color:var(--text-muted);margin-top:2px;}
.topic-note{font-size:12px;color:var(--text-faint);margin-top:4px;font-style:italic;}
.mode-tabs{display:flex;gap:0;border:0.5px solid var(--border-mid);border-radius:var(--radius-sm);overflow:hidden;width:fit-content;margin-bottom:1.1rem;}
.mode-tab{padding:6px 14px;font-size:12px;background:var(--surface);color:var(--text-muted);border:none;border-right:0.5px solid var(--border-mid);cursor:pointer;transition:background .1s;font-family:inherit;}
.mode-tab:last-child{border-right:none;}
.mode-tab.active{background:var(--bg);color:var(--text);font-weight:500;}
.mode-tab.hidden{display:none;}
.section{display:none;}
.section.visible{display:block;}
.hint{font-size:12px;color:var(--text-faint);margin-bottom:.9rem;}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:9px;}
.vocab-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 10px;cursor:pointer;text-align:center;min-height:88px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:border-color .12s;user-select:none;}
.vocab-card:hover{border-color:var(--border-mid);}
.vocab-card .zh-big{font-size:19px;color:var(--text);}
.vocab-card .pinyin{font-size:11px;color:var(--purple-mid);}
.vocab-card .en-sm{font-size:12px;color:var(--text-muted);display:none;}
.vocab-card.flipped .pinyin{display:none;}
.vocab-card.flipped .en-sm{display:block;}
.vocab-card.no-pinyin .pinyin{display:none!important;}
.progress-bar{height:3px;background:var(--border);border-radius:99px;margin-bottom:1.1rem;overflow:hidden;}
.progress-fill{height:100%;background:var(--purple-mid);border-radius:99px;transition:width .3s;}
.quiz-box{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:.9rem;}
.quiz-prompt{font-size:26px;font-weight:500;color:var(--text);text-align:center;margin-bottom:5px;}
.quiz-pinyin{font-size:13px;color:var(--purple-mid);text-align:center;margin-bottom:1.25rem;min-height:20px;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.quiz-opt{padding:10px 13px;border:0.5px solid var(--border-mid);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;text-align:left;transition:background .1s;font-family:inherit;}
.quiz-opt:hover{background:var(--bg);}
.quiz-opt.correct{background:var(--teal-bg);border-color:var(--teal-border);color:var(--teal-text);}
.quiz-opt.wrong{background:var(--red-bg);border-color:var(--red-border);color:var(--red-text);}
.quiz-feedback{font-size:13px;color:var(--text-muted);text-align:center;min-height:20px;margin-top:10px;}
.quiz-nav{display:flex;align-items:center;justify-content:space-between;}
.quiz-score{font-size:13px;color:var(--text-muted);}
.type-input-wrap{display:flex;gap:8px;margin-bottom:8px;}
.type-input{flex:1;padding:10px 14px;border:0.5px solid var(--border-mid);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:18px;font-family:inherit;outline:none;}
.type-input:focus{border-color:var(--purple-mid);box-shadow:0 0 0 2px rgba(127,119,221,.15);}
.type-result{font-size:13px;min-height:20px;margin-top:4px;}
.type-result.ok{color:var(--teal-text);}
.type-result.bad{color:var(--red-text);}
.type-hint{font-size:12px;color:var(--text-faint);margin-top:6px;}
.build-display{min-height:52px;border:0.5px solid var(--border-mid);border-radius:var(--radius-sm);padding:11px 13px;font-size:18px;color:var(--text);margin-bottom:9px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;background:var(--surface);}
.built-word{background:var(--purple-bg);color:var(--purple-text);border:0.5px solid var(--purple-border);border-radius:var(--radius-sm);padding:4px 10px;font-size:14px;cursor:pointer;user-select:none;}
.word-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
.word-chip{background:var(--surface);color:var(--text);border:0.5px solid var(--border-mid);border-radius:var(--radius-sm);padding:6px 12px;font-size:14px;cursor:pointer;user-select:none;transition:background .1s;}
.word-chip:hover{background:var(--bg);}
.word-chip.used{opacity:.25;pointer-events:none;}
.build-result{font-size:13px;min-height:18px;margin-top:4px;}
.build-result.ok{color:var(--teal-text);}
.build-result.bad{color:var(--red-text);}
.build-prompt{font-size:13px;color:var(--text-muted);margin-bottom:5px;}
.build-en{font-size:15px;font-weight:500;color:var(--text);margin-bottom:10px;}
.build-counter{font-size:12px;color:var(--text-faint);margin-top:8px;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:0.5px solid var(--border-mid);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;transition:background .1s;}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--purple-bg);color:var(--purple-text);border-color:var(--purple-border);font-weight:500;}
.btn-primary:hover{background:#e0defd;}
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.done-state{text-align:center;padding:2rem 1rem;}
.done-state .big{font-size:30px;margin-bottom:8px;}
.done-state p{color:var(--text-muted);font-size:14px;margin-bottom:1.25rem;}
@media(max-width:600px){
  .layout{grid-template-columns:1fr;padding:1rem;}
  .sidebar{position:static;}
  .topic-list{flex-direction:row;flex-wrap:wrap;gap:5px;}
  .topic-btn{width:auto;font-size:11px;padding:5px 9px;}
  .topic-num{display:none;}
  .quiz-options{grid-template-columns:1fr;}
  .site-header{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>
<header class="site-header">
  <div><div class="site-title">Chinese Practice</div><div class="site-desc">NYC · Tech · Heritage speaker</div></div>
  <div class="level-tabs" id="levelTabs"></div>
</header>
<div class="level-desc" id="levelDesc"></div>

</div>

   vocab:[{zh:"夹缝中生存",py:"jiāfèng zhōng shēngcún",en:"surviving between two worlds"},{zh:"认同感",py:"rèntóng gǎn",en:"sense of belonging"},{zh:"边缘化",py:"biānyuán huà",en:"marginalized"},{zh:"文化断层",py:"wénhuà duàncéng",en:"cultural disconnect"},{zh:"刻板印象",py:"kèbǎn yìnxiàng",en:"stereotype"},{zh:"拧巴",py:"nǐng ba",en:"internally conflicted (colloquial)"},{zh:"找到自己的位置",py:"zhǎodào zìjǐ de wèizhì",en:"find your place"},{zh:"两边都不完全属于",py:"liǎng biān dōu bù wánquán shǔyú",en:"don't fully belong to either"}],
   sentences:[{en:"As an ABC I've always felt between two worlds.",zh:"作为华裔，我一直感觉在夹缝中生存。",words:["作为","华裔","我","一直","感觉在","夹缝中生存","认同感"]},{en:"I don't fully belong to either side — I've accepted that.",zh:"两边都不完全属于，我已经接受了。",words:["两边","都不完全","属于","我","已经","接受了","文化断层"]},{en:"It used to feel conflicting — now I'm finding my place.",zh:"以前感觉很拧巴，现在慢慢找到自己的位置了。",words:["以前","感觉","很拧巴","现在","慢慢","找到","自己的位置了"]}]},
  {level:3,zh:"辩论和说服",en:"Debating & persuading",note:"Hold a real argument — logic, structure, landing a point",
   vocab:[{zh:"恰恰相反",py:"qiàqià xiāngfǎn",en:"quite the opposite"},{zh:"以偏概全",py:"yǐ piān gài quán",en:"overgeneralizing"},{zh:"站不住脚",py:"zhàn bu zhù jiǎo",en:"doesn't hold up"},{zh:"不得不承认",py:"bùdé bù chéngrèn",en:"have to admit"},{zh:"退一步说",py:"tuì yī bù shuō",en:"even if we grant that"},{zh:"关键在于",py:"guānjiàn zài yú",en:"the key point is"},{zh:"本质上",py:"běnzhì shàng",en:"fundamentally"},{zh:"举个例子",py:"jǔ ge lìzi",en:"to give an example"}],
   sentences:[{en:"That's quite the opposite of what the data shows.",zh:"这恰恰和数据显示的相反。",words:["这","恰恰","和数据","显示的","相反","以偏概全"]},{en:"The key point is — even granting that, it doesn't hold.",zh:"关键在于，退一步说，这也站不住脚。",words:["关键在于","退一步说","这也","站不住脚","不得不承认"]},{en:"Fundamentally, you're overgeneralizing.",zh:"本质上，你是在以偏概全。",words:["本质上","你是在","以偏概全","举个例子","关键在于"]}]},
  {level:3,zh:"幽默和玩笑",en:"Humor & banter",note:"The final boss — landing a joke without it falling flat",slang:true,
   vocab:[{zh:"阴阳怪气",py:"yīnyáng guàiqì",en:"passive-aggressive / sarcastic"},{zh:"绷不住",py:"běng bu zhù",en:"can't keep a straight face"},{zh:"整活",py:"zhěng huó",en:"pull a stunt / be funny"},{zh:"好家伙",py:"hǎo jiāhuo",en:"whoa / damn (surprise)"},{zh:"不是吧",py:"bù shì ba",en:"no way / you're kidding"},{zh:"玩梗",py:"wán gěng",en:"use a meme / running joke"},{zh:"笑点低",py:"xiào diǎn dī",en:"easy to make laugh"},{zh:"损人不带脏字",py:"sǔn rén bù dài zāng zì",en:"roast without swearing"}],
   sentences:[{en:"No way — you have to be kidding.",zh:"不是吧，你在开玩笑吧？",words:["不是吧","你在","开玩笑","吧","好家伙","绷不住"]},{en:"I can't keep a straight face — too funny.",zh:"我真的绷不住了，太好笑了。",words:["我真的","绷不住了","太","好笑了","好家伙","笑点低"]},{en:"You're being sarcastic again — classic.",zh:"你又在阴阳怪气了，一如既往。",words:["你又在","阴阳怪气了","一如既往","整活","玩梗"]}]},
  {level:3,zh:"谈未来和职业规划",en:"Future plans & career vision",note:"Long-term goals and ambitions in natural Chinese",
   vocab:[{zh:"长远打算",py:"chángyuǎn dǎsuàn",en:"long-term plan"},{zh:"往上走",py:"wǎng shàng zǒu",en:"move up"},{zh:"跳槽",py:"tiào cáo",en:"job hop"},{zh:"创业",py:"chuàngyè",en:"start a company"},{zh:"躺平不是我",py:"tǎng píng bú shì wǒ",en:"giving up isn't for me"},{zh:"走一步看一步",py:"zǒu yī bù kàn yī bù",en:"take it one step at a time"},{zh:"方向还没定",py:"fāngxiàng hái méi dìng",en:"direction isn't set"},{zh:"保持开放",py:"bǎochí kāifàng",en:"keep options open"}],
   sentences:[{en:"No firm direction yet — keeping my options open.",zh:"方向还没定，我想保持开放。",words:["方向","还没定","我想","保持开放","长远打算"]},{en:"I want to move up — giving up isn't for me.",zh:"我想往上走，躺平不是我的风格。",words:["我想","往上走","躺平不是我的","风格","跳槽","创业"]},{en:"Taking it one step at a time — maybe start something eventually.",zh:"走一步看一步，说不定以后会创业。",words:["走一步看一步","说不定","以后","会","创业","跳槽"]}]},
  {level:3,zh:"深夜吐槽",en:"Late-night venting",note:"Raw conversations — when colleagues drop the professional filter",slang:true,
   vocab:[{zh:"吐槽",py:"tǔcáo",en:"vent / rant"},{zh:"受够了",py:"shòu gòu le",en:"had enough"},{zh:"无语",py:"wúyǔ",en:"speechless (from absurdity)"},{zh:"就很离谱",py:"jiù hěn lípǔ",en:"it's just absurd"},{zh:"演员",py:"yǎnyuán",en:"actor (calling someone fake)"},{zh:"我悟了",py:"wǒ wù le",en:"I've had an epiphany"},{zh:"心态崩了",py:"xīntài bēng le",en:"I lost it / composure broke"},{zh:"我不理解",py:"wǒ bù lǐjiě",en:"I genuinely don't get it"}],
   sentences:[{en:"I've had enough — it's just absurd.",zh:"我真的受够了，就很离谱。",words:["我真的","受够了","就很","离谱","无语","心态崩了"]},{en:"I'm speechless — that person is so fake.",zh:"无语，那个人太像演员了。",words:["无语","那个人","太像","演员了","就很离谱","受够了"]},{en:"I've had an epiphany — my composure broke.",zh:"我悟了，心态直接崩了。",words:["我悟了","心态","直接","崩了","受够了","无语"]}]}
];

let curLevel=0,curTopic=0,curMode="vocab";
let quizOrder=[],quizIdx=0,quizScore=0,quizAnswered=false;
let buildIdx=0,builtWords=[],usedIdxs=[];
let typeIdx=0;

function topicsForLevel(lv){return TOPICS.filter(t=>t.level===lv);}

function init(){
  const ltabs=document.getElementById("levelTabs");
  LEVELS.forEach((lv,i)=>{
    const b=document.createElement("button");
    b.className="level-tab "+lv.cls+(i===0?" active":"");
    b.textContent=lv.label;
    b.onclick=()=>selectLevel(i);
    ltabs.appendChild(b);
  });
  selectLevel(0);
}

function selectLevel(lv){
  curLevel=lv;curTopic=0;
  document.querySelectorAll(".level-tab").forEach((b,i)=>b.classList.toggle("active",i===lv));
  document.getElementById("levelDesc").textContent=LEVELS[lv].desc;
  buildSidebar();
  setMode("vocab");
  renderTopic();
}

function buildSidebar(){
  const topics=topicsForLevel(curLevel);
  const list=document.getElementById("topicList");
  list.innerHTML="";
  topics.forEach((t,i)=>{
    const btn=document.createElement("button");
    btn.className="topic-btn"+(i===0?" active":"");
    const newTag=(t.level===curLevel&&curLevel>0)?'<span class="topic-new">NEW</span>':"";
    btn.innerHTML=`<span class="topic-num">${String(i+1).padStart(2,"0")}</span>${t.zh}${t.slang?'<span style="font-size:9px;color:var(--coral-text);margin-left:3px;">俚</span>':""}${newTag}`;
    btn.onclick=()=>selectTopic(i);
    list.appendChild(btn);
  });
}

function selectTopic(i){
  curTopic=i;
  document.querySelectorAll(".topic-btn").forEach((b,j)=>b.classList.toggle("active",j===i));
  setMode("vocab");
  renderTopic();
}

function renderTopic(){
  const t=topicsForLevel(curLevel)[curTopic];
  document.getElementById("topicZh").innerHTML=t.zh+(t.slang?'<span class="slang-tag">俚语</span>':"");
  document.getElementById("topicEn").textContent=t.en;
  document.getElementById("topicNote").textContent=t.note||"";
}

function setMode(m){
  curMode=m;
  const modes=["vocab","quiz","build","type"];
  document.querySelectorAll(".mode-tab").forEach((tab,i)=>{
    tab.classList.toggle("active",modes[i]===m);
    if(modes[i]==="type"&&curLevel===0)tab.classList.add("hidden");
    else if(modes[i]==="type")tab.classList.remove("hidden");
    if(modes[i]==="build"&&curLevel===3)tab.classList.add("hidden");
    else if(modes[i]==="build")tab.classList.remove("hidden");
  });
  modes.forEach(s=>document.getElementById("sec-"+s).classList.toggle("visible",s===m));
  if(m==="vocab")renderVocab();
  if(m==="quiz")initQuiz();
  if(m==="build")initBuild();
  if(m==="type")initType();
}

function renderVocab(){
  const t=topicsForLevel(curLevel)[curTopic];
  const noPy=curLevel>=2;
  document.getElementById("sec-vocab").innerHTML=
    `<p class="hint">${noPy?"Tap to reveal meaning.":"Tap to reveal meaning. Tap again to flip back."}</p>
     <div class="vocab-grid">${t.vocab.map(v=>`
      <div class="vocab-card${noPy?" no-pinyin":""}" onclick="this.classList.toggle('flipped')">
        <div class="zh-big">${v.zh}</div><div class="pinyin">${v.py}</div><div class="en-sm">${v.en}</div>
      </div>`).join("")}</div>`;
}

function initQuiz(){
  const t=topicsForLevel(curLevel)[curTopic];
  quizOrder=[...t.vocab].sort(()=>Math.random()-.5);
  quizIdx=0;quizScore=0;quizAnswered=false;
  renderQuestion();
}

function renderQuestion(){
  const t=topicsForLevel(curLevel)[curTopic];
  const sec=document.getElementById("sec-quiz");
  if(quizIdx>=quizOrder.length){
    sec.innerHTML=`<div class="done-state"><div class="big">完成！</div><p>Score: ${quizScore} / ${quizOrder.length}</p><button class="btn btn-primary" onclick="initQuiz()">Try again</button></div>`;
    return;
  }
  const item=quizOrder[quizIdx];
  const pct=Math.round((quizIdx/quizOrder.length)*100);
  const noPy=curLevel>=2;
  let opts=[item.en];
  t.vocab.filter(v=>v.en!==item.en).sort(()=>Math.random()-.5).slice(0,3).forEach(p=>opts.push(p.en));
  opts=opts.sort(()=>Math.random()-.5);
  sec.innerHTML=`
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="quiz-box">
      <div class="quiz-prompt">${item.zh}</div>
      <div class="quiz-pinyin">${noPy?"":item.py}</div>
      <div class="quiz-options" id="qOpts">
        ${opts.map(o=>`<button class="quiz-opt" onclick="answerQuiz(this,'${o.replace(/'/g,"\\'")}','${item.en.replace(/'/g,"\\'")}')">${o}</button>`).join("")}
      </div>
      <div class="quiz-feedback" id="qFeedback"></div>
    </div>
    <div class="quiz-nav"><span class="quiz-score">Score: ${quizScore} / ${quizOrder.length}</span><button class="btn" onclick="nextQuestion()">Next →</button></div>`;
}

function answerQuiz(btn,chosen,correct){
  if(quizAnswered)return;quizAnswered=true;
  const ok=chosen===correct;
  btn.classList.add(ok?"correct":"wrong");
  if(!ok)document.querySelectorAll(".quiz-opt").forEach(b=>{if(b.textContent===correct)b.classList.add("correct");});
  if(ok)quizScore++;
  document.getElementById("qFeedback").textContent=ok?"正确！":"答案是："+correct;
  document.querySelector(".quiz-score").textContent="Score: "+quizScore+" / "+quizOrder.length;
}

function nextQuestion(){quizIdx++;quizAnswered=false;renderQuestion();}

function initBuild(){buildIdx=0;renderBuild();}

function renderBuild(){
  const t=topicsForLevel(curLevel)[curTopic];
  const sec=document.getElementById("sec-build");
  if(buildIdx>=t.sentences.length){
    sec.innerHTML=`<div class="done-state"><div class="big">全部完成！</div><p>All sentences done.</p><button class="btn btn-primary" onclick="initBuild()">Start over</button></div>`;
    return;
  }
  const s=t.sentences[buildIdx];
  builtWords=[];usedIdxs=[];
  const allWords=[...s.words].sort(()=>Math.random()-.5);
  sec.innerHTML=`
    <p class="build-prompt">Arrange the words:</p>
    <p class="build-en">"${s.en}"</p>
    <div class="build-display" id="bDisplay"><span style="color:var(--text-faint);font-size:14px;">tap words below…</span></div>
    <div class="word-chips" id="bChips">${allWords.map((w,i)=>`<span class="word-chip" data-idx="${i}" onclick="addWord('${w.replace(/'/g,"\\'")}',${i},this)">${w}</span>`).join("")}</div>
    <div class="build-result" id="bResult"></div>
    <div class="action-row"><button class="btn" onclick="clearBuild()">Clear</button><button class="btn" onclick="checkBuild()">Check ✓</button><button class="btn" onclick="revealBuild()">Show answer</button></div>
    <div class="build-counter">${buildIdx+1} of ${t.sentences.length}</div>`;
}

function addWord(w,idx,chip){if(usedIdxs.includes(idx))return;usedIdxs.push(idx);chip.classList.add("used");builtWords.push({w,idx});refreshDisplay();}

function refreshDisplay(){
  const d=document.getElementById("bDisplay");
  if(!builtWords.length){d.innerHTML=`<span style="color:var(--text-faint);font-size:14px;">tap words below…</span>`;return;}
  d.innerHTML=builtWords.map((item,pos)=>`<span class="built-word" onclick="removeWord(${pos},${item.idx})">${item.w}</span>`).join("");
}

function removeWord(pos,idx){
  builtWords.splice(pos,1);usedIdxs=usedIdxs.filter(i=>i!==idx);
  document.querySelectorAll(".word-chip").forEach(c=>{if(parseInt(c.dataset.idx)===idx)c.classList.remove("used");});
  refreshDisplay();
  const r=document.getElementById("bResult");if(r){r.textContent="";r.className="build-result";}
}

function clearBuild(){
  builtWords=[];usedIdxs=[];
  document.querySelectorAll(".word-chip").forEach(c=>c.classList.remove("used"));
  refreshDisplay();
  const r=document.getElementById("bResult");if(r){r.textContent="";r.className="build-result";}
}

function checkBuild(){
  const s=topicsForLevel(curLevel)[curTopic].sentences[buildIdx];
  const built=builtWords.map(b=>b.w).join("");
  const target=s.zh.replace(/[。？！，]/g,"");
  const res=document.getElementById("bResult");
  if(built===target){res.textContent="正确！ "+s.zh;res.className="build-result ok";setTimeout(()=>{buildIdx++;renderBuild();},1400);}
  else{res.textContent="Not quite — try rearranging!";res.className="build-result bad";}
}

function revealBuild(){
  const s=topicsForLevel(curLevel)[curTopic].sentences[buildIdx];
  const res=document.getElementById("bResult");
  res.textContent="Answer: "+s.zh;res.className="build-result";
  setTimeout(()=>{buildIdx++;renderBuild();},2000);
}

function initType(){typeIdx=0;renderType();}

function renderType(){
  const t=topicsForLevel(curLevel)[curTopic];
  const sec=document.getElementById("sec-type");
  if(typeIdx>=t.sentences.length){
    sec.innerHTML=`<div class="done-state"><div class="big">全部完成！</div><p>All sentences typed.</p><button class="btn btn-primary" onclick="initType()">Start over</button></div>`;
    return;
  }
  const s=t.sentences[typeIdx];
  const noPy=curLevel>=2;
  sec.innerHTML=`
    <p class="build-prompt">Type the Chinese for:</p>
    <p class="build-en">"${s.en}"</p>
    <div class="type-input-wrap">
      <input class="type-input" id="typeBox" type="text" placeholder="Type here…" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkType()">
      <button class="btn btn-primary" onclick="checkType()">Check</button>
    </div>
    <div class="type-result" id="typeResult"></div>
    ${noPy?"":'<div class="type-hint">Tip: switch keyboard to Chinese (Pinyin) input</div>'}
    <div class="action-row" style="margin-top:14px;">
      <button class="btn" onclick="revealType()">Show answer</button>
      <button class="btn" onclick="skipType()">Skip →</button>
    </div>
    <div class="build-counter">${typeIdx+1} of ${t.sentences.length}</div>`;
  document.getElementById("typeBox").focus();
}

function checkType(){
  const s=topicsForLevel(curLevel)[curTopic].sentences[typeIdx];
  const input=document.getElementById("typeBox").value.trim().replace(/[。？！，\s]/g,"");
  const target=s.zh.replace(/[。？！，\s]/g,"");
  const res=document.getElementById("typeResult");
  if(input===target){res.textContent="正确！";res.className="type-result ok";setTimeout(()=>{typeIdx++;renderType();},1200);}
  else{res.textContent="Not quite — check your characters.";res.className="type-result bad";}
}

function revealType(){
  const s=topicsForLevel(curLevel)[curTopic].sentences[typeIdx];
  document.getElementById("typeResult").textContent="Answer: "+s.zh;
  document.getElementById("typeResult").className="type-result";
  setTimeout(()=>{typeIdx++;renderType();},2200);
}

function skipType(){typeIdx++;renderType();}

init();
</script>
</body>
